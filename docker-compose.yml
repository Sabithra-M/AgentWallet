# No local Postgres service — AgentWallet is built against a managed
# Postgres connection string (Neon or equivalent) via DATABASE_URL in
# server/.env. Point DATABASE_URL at any reachable Postgres 14+ instance.
services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - '5000:5000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    ports:
      - '5173:5173'
    depends_on:
      - server
    restart: unless-stopped
